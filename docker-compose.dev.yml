services:
  redis:
    image: redis:alpine
    container_name: mon5majeur-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: mon5majeur-backend
    container_name: mon5majeur-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: always
