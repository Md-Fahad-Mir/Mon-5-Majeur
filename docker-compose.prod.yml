version: "3.9"

services:
  redis:
    image: redis:alpine
    container_name: mon5majeur-redis
    restart: always

  backend:
    image: fahad1000mir/mon5majeur:backend-latest
    container_name: mon5majeur-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: always
